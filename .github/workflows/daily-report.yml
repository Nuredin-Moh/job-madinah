name: daily-report
on:
  schedule:
    # 18:00 UTC = 21:00 KSA (end of work day)
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send daily report
        env:
          # SMTP (Hostinger/Gmail) — same secrets the send pipeline uses.
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
        # The report reads the repo's committed data/ files (sent_history.csv,
        # portal_applications.csv, ...). No external tracking CSV / gist needed.
        run: python3 scripts/daily_report.py
