name: qa-on-push
on:
  push:
    paths:
      - "data/**"
      - "scripts/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "data/**"
      - "scripts/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint Python scripts
        run: |
          python3 -m py_compile scripts/qa.py scripts/daily_report.py scripts/followup_scheduler.py
          echo "[OK] Python scripts compile cleanly"

      - name: Validate companies.csv structure
        run: |
          if [ -f data/companies.csv ]; then
            python3 -c "
          import csv
          with open('data/companies.csv', newline='', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              required = {'name', 'sector', 'city', 'priority'}
              cols = set(reader.fieldnames or [])
              missing = required - cols
              assert not missing, f'companies.csv missing columns: {missing}'
              rows = list(reader)
              print(f'[OK] companies.csv: {len(rows)} rows, columns {cols}')
          "
          else
            echo "[INFO] data/companies.csv not present yet — skipping"
          fi
