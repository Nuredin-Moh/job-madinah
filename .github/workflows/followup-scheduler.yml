name: followup-scheduler
on:
  schedule:
    # 08:00 UTC = 11:00 KSA (peak send window)
    - cron: "0 8 * * 0,1,2,3" # Sunday-Wednesday only (KSA work week)
  workflow_dispatch:

jobs:
  schedule_followups:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve tracking CSV source
        env:
          TRACKING_GIST_TOKEN: ${{ secrets.TRACKING_GIST_TOKEN }}
          TRACKING_GIST_ID: ${{ secrets.TRACKING_GIST_ID }}
        run: |
          if [ -n "$TRACKING_GIST_ID" ] && [ -n "$TRACKING_GIST_TOKEN" ]; then
            mkdir -p /tmp/tracking
            curl -s -H "Authorization: Bearer ${TRACKING_GIST_TOKEN}" \
              "https://api.github.com/gists/${TRACKING_GIST_ID}" \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print(list(d['files'].values())[0]['content'])" \
              > /tmp/tracking/Tracking-Candidatures.csv
            echo "JOB_MADINAH_TRACKING_CSV=/tmp/tracking/Tracking-Candidatures.csv" >> $GITHUB_ENV
          else
            echo "JOB_MADINAH_TRACKING_CSV=$GITHUB_WORKSPACE/data/tracking.csv" >> $GITHUB_ENV
          fi

      - name: Generate follow-ups
        run: python3 scripts/followup_scheduler.py

      - name: Upload follow-ups as artifact
        uses: actions/upload-artifact@v4
        with:
          name: followups-${{ github.run_number }}
          path: /tmp/followups_*.md
          retention-days: 30

      - name: Email follow-ups markdown to Nuredin
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
        run: |
          python3 - <<'PYEOF'
          import os, smtplib, glob
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.application import MIMEApplication

          gmail_user = os.environ.get("GMAIL_USER", "nuredinmohamedali@gmail.com")
          gmail_pw = os.environ.get("GMAIL_APP_PASSWORD", "")
          recipient = os.environ.get("REPORT_RECIPIENT", "nuredinmohamedali@gmail.com")

          if not gmail_pw:
              print("[INFO] GMAIL_APP_PASSWORD missing, skipping email send")
              raise SystemExit(0)

          md_files = sorted(glob.glob("/tmp/followups_*.md"))
          if not md_files:
              print("[INFO] No follow-ups generated today")
              raise SystemExit(0)

          msg = MIMEMultipart()
          msg["From"] = gmail_user
          msg["To"] = recipient
          msg["Subject"] = "[Job Madinah] Daily follow-ups ready to send"

          with open(md_files[-1], "r", encoding="utf-8") as f:
              content = f.read()
          msg.attach(MIMEText("Daily follow-ups generated. See attached markdown for ready-to-copy drafts.\n\nPaste each block into a Gmail REPLY to the original thread.", "plain", "utf-8"))

          with open(md_files[-1], "rb") as f:
              part = MIMEApplication(f.read(), Name=os.path.basename(md_files[-1]))
              part["Content-Disposition"] = f'attachment; filename="{os.path.basename(md_files[-1])}"'
              msg.attach(part)

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(gmail_user, gmail_pw)
              server.send_message(msg)
          print(f"[OK] Follow-ups emailed to {recipient}")
          PYEOF
