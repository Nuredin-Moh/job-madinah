name: followup-scheduler
on:
  schedule:
    # 08:00 UTC = 11:00 KSA (peak send window) — Sunday-Wednesday only (KSA work week)
    - cron: "0 8 * * 0,1,2,3"
  workflow_dispatch:

jobs:
  schedule_followups:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate follow-ups
        # Reads data/sent_history.csv (committed). No external tracking CSV / gist needed.
        run: python3 scripts/followup_scheduler.py

      - name: Upload follow-ups as artifact
        uses: actions/upload-artifact@v4
        with:
          name: followups-${{ github.run_number }}
          path: /tmp/followups_*.md
          retention-days: 30

      - name: Email follow-ups markdown to Nuredin
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_USE_SSL: ${{ secrets.SMTP_USE_SSL }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
        run: |
          python3 - <<'PYEOF'
          import os, smtplib, glob
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.application import MIMEApplication

          smtp_host = os.environ.get("SMTP_HOST", "smtp.gmail.com")
          smtp_port = int(os.environ.get("SMTP_PORT", "587"))
          smtp_user = os.environ.get("SMTP_USER", "")
          smtp_pw = os.environ.get("SMTP_PASSWORD", "")
          smtp_from = os.environ.get("SMTP_FROM", smtp_user)
          smtp_ssl = os.environ.get("SMTP_USE_SSL", "0") == "1"
          recipient = os.environ.get("REPORT_RECIPIENT", "nuredinmohamedali@gmail.com")

          if not smtp_pw:
              print("[INFO] SMTP_PASSWORD missing, skipping email send")
              raise SystemExit(0)

          md_files = sorted(glob.glob("/tmp/followups_*.md"))
          if not md_files:
              print("[INFO] No follow-ups file generated")
              raise SystemExit(0)

          with open(md_files[-1], "r", encoding="utf-8") as fh:
              content = fh.read()
          if "Total: 0 contacts" in content:
              print("[INFO] 0 follow-ups due today, skipping email")
              raise SystemExit(0)

          msg = MIMEMultipart()
          msg["From"] = smtp_from
          msg["To"] = recipient
          msg["Subject"] = "[Job Madinah] Daily follow-ups ready to send"
          msg.attach(MIMEText("Daily follow-ups generated. See attached markdown for ready-to-copy drafts.\n\nPaste each block into a Gmail REPLY to the original thread.", "plain", "utf-8"))
          with open(md_files[-1], "rb") as fh:
              part = MIMEApplication(fh.read(), Name=os.path.basename(md_files[-1]))
          part["Content-Disposition"] = 'attachment; filename="' + os.path.basename(md_files[-1]) + '"'
          msg.attach(part)

          if smtp_ssl:
              server = smtplib.SMTP_SSL(smtp_host, smtp_port, timeout=30)
          else:
              server = smtplib.SMTP(smtp_host, smtp_port, timeout=30)
              server.ehlo()
              server.starttls()
              server.ehlo()
          server.login(smtp_user, smtp_pw)
          server.send_message(msg)
          server.quit()
          print("[OK] Follow-ups emailed to " + recipient)
          PYEOF
